<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Viewer</title>
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-neutral-950 min-h-screen flex flex-col items-center justify-center gap-5 p-6"
  >
    <model-viewer
      id="mv"
      src="./factory_props.glb"
      camera-controls
      shadow-intensity="1"
      ar
      ar-modes="webxr scene-viewer quick-look"
      class="absolute w-full top-0 h-[100vh]"
    ></model-viewer>

    <button
      onclick="document.getElementById('mv').activateAR()"
      class="absolute bottom-24 bg-yellow-300 text-black font-bold text-sm px-8 py-3 rounded-xl hover:bg-yellow-200 transition-colors"
    >
      View in AR
    </button>
  </body>
</html>
